services:
  gateway:
    restart: unless-stopped
    container_name: gateway
    image: gateway-service
    pull_policy: build
    build:
      context: ./services/gateway/
      dockerfile: Dockerfile.debug
    env_file: .env
    ports:
      - "8080:8080"
      - "40000:40000"
    volumes:
      - ./services/gateway:/app
    security_opt:
      - "seccomp:unconfined"
    cap_add:
      - SYS_PTRACE
