services:
  guild-db:
    container_name: guild-db
    image: docker.io/postgres:17-alpine
    env_file: ${PWD}/services/guild/.env
    volumes:
      - guild_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "guild", "-d", "guild"]
      interval: 5s
      timeout: 3s
      retries: 10

  guild-migrate:
    container_name: guild-migrate
    image: guild-service
    pull_policy: never
    build:
      context: ${PWD}/services/guild
      dockerfile: Dockerfile
    command: dotnet ef database update --project src/Guild.Persistence/Guild.Persistence.csproj --startup-project src/Guild.Presentation/Guild.Presentation.csproj
    env_file: ${PWD}/services/guild/.env
    profiles: ["migrate"]
    depends_on:
      guild-db:
        condition: service_healthy

  guild:
    container_name: guild
    image: guild-service
    pull_policy: never
    build:
      context: ${PWD}/services/guild
      dockerfile: Dockerfile
    env_file: ${PWD}/services/guild/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/hello-world"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__VirtualHost: /
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASS}
      Services__UserService: http://user:8080
      BackendConfiguration__BaseUrl: ${BASE_URL}
      BackendConfiguration__BaseApiUrl: ${BASE_API_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      guild-db:
        condition: service_healthy

volumes:
  guild_db_data:
