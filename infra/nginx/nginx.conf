events {}

http {
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name localhost;
        return 301 https://$host:1443$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        location = /docs {
            root /etc/nginx;
            try_files /docs.html @docs_unavailable;
            default_type text/html;
        }

        location @docs_unavailable {
            default_type text/html;
            return 404 '<!doctype html><html><head><meta charset="utf-8"><title>API Docs?</title><style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#0f0f0f;color:#ccc}div{text-align:center}img{border-radius:8px;margin-bottom:1.5rem}p{font-size:1.1rem;margin-top:.5rem}small{color:#555}</style></head><body><div><img src="https://http.cat/images/404.jpg" alt="404"><p>API docs are only available in development mode.</p><small>Start the dev environment with <code>make dev</code></small></div></body></html>';
        }

        location /api/ {
            proxy_pass http://gateway:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }
    }
}
